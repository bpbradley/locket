[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.30.2"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "aarch64-unknown-linux-musl", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-unknown-linux-musl"]
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Whether to install an updater program
install-updater = true
# Steps injected into build-local-artifacts: builds the Go op bridge per
# target and exports LOCKET_OP_BRIDGE_BIN_<TRIPLE> for build.rs embedding.
# Path is relative to .github/workflows/.
github-build-setup = "../build-setup.yml"

# Standalone bridge binaries for cargo-install users (the release
# binaries embed the bridge; these are for `cargo install locket`,
# dropped next to the locket binary, e.g. in ~/.cargo/bin).
[[dist.extra-artifacts]]
artifacts = [
    "target/op-bridge-artifacts/locket-op-bridge-x86_64-linux",
    "target/op-bridge-artifacts/locket-op-bridge-aarch64-linux",
    "target/op-bridge-artifacts/locket-op-bridge-x86_64-macos",
    "target/op-bridge-artifacts/locket-op-bridge-aarch64-macos",
]
build = ["bash", ".github/scripts/build-op-bridge-artifacts.sh"]
