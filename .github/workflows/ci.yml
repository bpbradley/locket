name: CI

on:
    pull_request:
        branches: [main]
    push:
        branches: [main]

permissions:
    contents: read
    pull-requests: read
    packages: write
    actions: write

jobs:
    filter:
        name: Filter changed files
        runs-on: ubuntu-latest
        permissions:
            pull-requests: read
            contents: read
        outputs:
            rust: ${{ steps.filter.outputs.rust }}
            docker: ${{ steps.filter.outputs.docker }}
            bridge: ${{ steps.filter.outputs.bridge }}
        steps:
            - uses: actions/checkout@v7
            - uses: dorny/paths-filter@v4
              id: filter
              with:
                  filters: |
                      rust:
                        - 'src/**'
                        - 'tests/**'
                        - 'xtask/**'
                        - 'locket_derive/**'
                        - 'Cargo.toml'
                        - 'Cargo.lock'
                        - 'rust-toolchain.*'
                        - 'tools/op-bridge/**'
                      docker:
                        - 'docker/**'
                        - '!docker/tests/**'
                        - 'compose*.yml'
                        - 'compose*.yaml'
                      bridge:
                        - 'tools/op-bridge/**'
    locket:
        name: Build, clippy, test
        needs: filter
        if: needs.filter.outputs.rust == 'true'
        runs-on: ubuntu-latest
        env:
            RUSTFLAGS: -D warnings
            CARGO_TERM_COLOR: always
        steps:
            - uses: actions/checkout@v7
            - uses: dtolnay/rust-toolchain@stable
              with:
                  components: clippy, rustfmt
            - uses: swatinem/rust-cache@v2
            - run: cargo fmt -- --check
            - run: cargo build --locked
            - run: cargo test --locked
            - run: cargo clippy --all-targets
            - run: cargo xtask docs --check
            - uses: actions/setup-go@v7
              with:
                  go-version-file: tools/op-bridge/go.mod
                  cache-dependency-path: tools/op-bridge/go.sum
            - run: go build -C tools/op-bridge -trimpath -o /tmp/locket-op-bridge .
            - run: cargo test --locked --features testing --test op_bridge -- --ignored
              env:
                  LOCKET_OP_BRIDGE_TEST_BIN: /tmp/locket-op-bridge

    bridge:
        name: Go bridge
        needs: filter
        if: needs.filter.outputs.bridge == 'true'
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: tools/op-bridge
        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-go@v7
              with:
                  go-version-file: tools/op-bridge/go.mod
                  cache-dependency-path: tools/op-bridge/go.sum
            - run: test -z "$(gofmt -s -l .)"
            - run: go vet ./...
            - run: go test ./...
            - run: CGO_ENABLED=0 go build -trimpath ./...

    docker:
        name: Docker build
        needs: filter
        if: needs.filter.outputs.docker == 'true' || needs.filter.outputs.rust == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7

            - name: Setup Buildx
              uses: docker/setup-buildx-action@v4
              with:
                  driver: docker-container

            - name: Login to GHCR
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build images
              working-directory: docker
              env:
                  CI: true
                  # Match the release workflow's amd64 cache refs so PR and
                  # release builds share a warm cache.
                  CACHE_SUFFIX: amd64
                  # Fork PR tokens cannot write packages, so only refresh
                  # the cache on pushes to main.
                  CACHE_WRITE: ${{ github.event_name == 'push' }}
              run: |
                  docker buildx bake --allow=fs.read=.. -f docker-bake.hcl --set "*.output=type=cacheonly" release
