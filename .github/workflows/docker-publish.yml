name: Publish

on:
    push:
        tags:
            - "**[0-9]+.[0-9]+.[0-9]+*"

permissions:
    contents: write
    packages: write
    actions: write

jobs:
    meta:
        name: Release Metadata
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.meta.outputs.version }}
            is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
        steps:
            - name: Calculate Version and Pre-release State
              id: meta
              run: |
                  REF="${GITHUB_REF_NAME}"
                  CLEAN_VERSION="${REF#v}"

                  echo "version=$CLEAN_VERSION" >> "$GITHUB_OUTPUT"

                  # Bash check: Does the version contain a hyphen?
                  if [[ "$CLEAN_VERSION" == *"-"* ]]; then
                     echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
                     echo "prerelease"
                  else
                     echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
                  fi

    build:
        name: Build / Push Digests (${{ matrix.platform }})
        needs: meta
        strategy:
            matrix:
                include:
                    - platform: linux/amd64
                      runner: ubuntu-latest
                      suffix: amd64
                    - platform: linux/arm64
                      runner: ubuntu-24.04-arm
                      suffix: arm64
        runs-on: ${{ matrix.runner }}
        env:
            BUILDX_BAKE_ENTITLEMENTS_FS: 0
        steps:
            - uses: actions/checkout@v7

            - name: Setup Registries
              run: |
                  echo "REGISTRIES=ghcr.io/${{ github.repository_owner }},docker.io/${{ secrets.DOCKERHUB_USERNAME }}" >> $GITHUB_ENV

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4
              with:
                  driver: docker-container

            - name: Login to GHCR
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Login to Docker Hub
              uses: docker/login-action@v4
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build / Push by Digest
              working-directory: docker
              env:
                  VERSION: ${{ needs.meta.outputs.version }}
                  IS_PRERELEASE: ${{ needs.meta.outputs.is_prerelease }}
                  REGISTRIES: ${{ env.REGISTRIES }}
                  PLATFORMS: ${{ matrix.platform }}
                  CACHE_SUFFIX: ${{ matrix.suffix }}
                  PUSH_BY_DIGEST: true
                  CACHE_WRITE: true
                  CI: true
              run: |
                  docker buildx bake \
                      --allow=fs.read=.. \
                      -f docker-bake.hcl \
                      release \
                      --metadata-file metadata.json

            - name: Upload Bake Metadata
              uses: actions/upload-artifact@v4
              with:
                  name: bake-metadata-${{ matrix.suffix }}
                  path: docker/metadata.json
                  if-no-files-found: error
                  retention-days: 1

    merge:
        name: Merge Manifests / Publish Plugin
        needs: [meta, build]
        runs-on: ubuntu-latest
        env:
            VERSION: ${{ needs.meta.outputs.version }}
            IS_PRERELEASE: ${{ needs.meta.outputs.is_prerelease }}
        steps:
            - uses: actions/checkout@v7

            - name: Setup Registries
              run: |
                  echo "REGISTRIES=ghcr.io/${{ github.repository_owner }},docker.io/${{ secrets.DOCKERHUB_USERNAME }}" >> $GITHUB_ENV

            - name: Login to GHCR
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Login to Docker Hub
              uses: docker/login-action@v4
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Download Bake Metadata
              uses: actions/download-artifact@v4
              with:
                  pattern: bake-metadata-*
                  path: bake-metadata

            - name: Create Multi-arch Manifests
              working-directory: docker
              run: |
                  docker buildx bake -f docker-bake.hcl release --print > bake-plan.json 2>/dev/null

                  for tgt in $(jq -r '.group.release.targets[]' bake-plan.json); do
                      amd=$(jq -r --arg t "$tgt" '.[$t]."containerimage.digest"' ../bake-metadata/bake-metadata-amd64/metadata.json)
                      arm=$(jq -r --arg t "$tgt" '.[$t]."containerimage.digest"' ../bake-metadata/bake-metadata-arm64/metadata.json)

                      if [[ "$amd" == "null" || "$arm" == "null" ]]; then
                          echo "Missing digest for target '$tgt' (amd64: $amd, arm64: $arm)" >&2
                          exit 1
                      fi

                      for repo in $(jq -r --arg t "$tgt" '[.target[$t].tags[] | sub(":[^:/]+$"; "")] | unique | .[]' bake-plan.json); do
                          tag_args=$(jq -r --arg t "$tgt" --arg repo "$repo" \
                              '.target[$t].tags[] | select(startswith($repo + ":")) | "--tag " + .' bake-plan.json)
                          docker buildx imagetools create $tag_args "${repo}@${amd}" "${repo}@${arm}"
                      done
                  done

            - name: Create and Push Plugin
              working-directory: docker
              run: |
                  jq '{plugin: {"image.name": (.target.plugin.tags | join(","))}}' bake-plan.json > plugin-metadata.json
                  ./build-plugin.sh --metadata ./plugin-metadata.json --push
